# 瓴羊案例撰写 Skill
# 版本：v1.2
# 更新：新增角度确认、标题方案输出；板块标题改为动态生成

name: linyang_case_writer
description: >
  瓴羊案例撰写专用 Skill。读取用户上传的客户资料，确认产品归属，
  引导用户选择案例角度，最终输出结构完整、业务语言鲜活的客户案例。
  适用于 AgentOne、Quick BI、Dataphin、Quick Audience、
  Quick Stock、Quick Service、帆软替换等产品的案例撰写。

# ──────────────────────────────────────
# 产品列表
# ──────────────────────────────────────
products:
  - AgentOne（智能体平台）
  - Quick BI（商业智能分析）
  - Dataphin（数据中台）
  - Quick Audience（营销人群平台）
  - Quick Service（智能客服）
  - 天攻智投（户外投手）
  - appwin（app流量变现工具）
  - addwin（智能广告营销体系） 

# ──────────────────────────────────────
# 执行步骤
# ──────────────────────────────────────
steps:

  - step: 1
    name: 读取并分析用户上传的资料
    instruction: >
      仔细阅读用户上传的全部资料（文档、PDF、图片均需读取）。
      提炼以下信息，仅供内部分析，本步骤不输出任何内容，静默处理：
      - 客户名称与所属行业
      - 涉及的瓴羊产品（对照产品列表逐一判断）
      - 核心业务场景与痛点
      - 可量化的成效数据
    output: 无（内部分析，静默处理，不向用户输出任何内容）

  - step: 2
    name: 向用户确认产品归属
    instruction: >
      读完资料后，必须主动向用户输出以下确认信息。
      格式固定，不得省略，不得跳过直接开始撰写。
    output_template: |
      我已读取您上传的资料，识别到以下信息：

      · 客户名称：{客户名称}
      · 所属行业：{行业}
      · 涉及的瓴羊产品：{产品列表}
      · 核心业务场景：{场景简述}

      请确认以上信息是否正确？如有遗漏或错误，请直接告诉我。
    rule: >
      必须等用户明确回复"对/没问题/确认/继续"后，方可进入下一步。
      用户如有纠正，更新信息后重新确认，直到用户认可。

  - step: 3
    name: 提供三个案例角度，请用户选择
    instruction: >
      用户确认产品信息后，根据资料内容提炼 3 个差异化的案例切入角度供用户选择。
      每个角度需包含：角度名称、核心叙事逻辑、适合的读者群体。
      三个角度应有明显差异，覆盖不同叙事维度，例如：
        - 角度A：以最亮眼的量化结果为核心，数字驱动叙事
        - 角度B：以客户转型历程为主线，时间线驱动叙事
        - 角度C：以某一具体核心场景（如会员复盘/选品/问数）深度展开
      可根据资料实际情况调整，不必拘泥于上述示例。
    output_template: |
      根据您的资料，我整理了 3 个案例撰写角度，请选择一个方向：

      【角度 A】{角度A名称}
      核心叙事：{角度A的叙事逻辑，1-2句话}
      适合读者：{角度A最适合的读者群体}

      【角度 B】{角度B名称}
      核心叙事：{角度B的叙事逻辑，1-2句话}
      适合读者：{角度B最适合的读者群体}

      【角度 C】{角度C名称}
      核心叙事：{角度C的叙事逻辑，1-2句话}
      适合读者：{角度C最适合的读者群体}

      请告诉我您选择哪个角度（A/B/C），或提出调整意见。
    rule: >
      必须等用户选定角度（或明确说"开始写"/"继续"）后，方可进入下一步。
      用户如有调整意见，修改角度后重新确认。

  - step: 4
    name: 确认补充信息（按需）
    instruction: >
      根据用户选定的角度，判断是否存在关键信息缺口，例如：
      成效数据缺失、关键人物引言缺失、落地时间节点不清晰等。
      若有缺口，向用户一次性列出所有补充问题，不超过 5 个。
      若资料已足够充分，可跳过本步骤，直接进入撰写。
    rule: 补充信息收集完毕（或无需补充）后，进入撰写步骤。

  - step: 5
    name: 撰写案例正文
    instruction: >
      按照用户选定的角度撰写案例全文，包含以下六个板块。

      【核心要求】每个板块的标题必须根据客户实际内容动态生成，
      严禁使用"背景""解决方案""成效""落地过程""核心经验"等空泛通用标题。

      标题撰写原则：业务语言 + 具体动作或结果，有画面感，有信息量。
      正确示例：
        ✅ "增速放缓、对手涌入，一家零食巨头的三道坎"
        ✅ "Dataphin打底、Quick BI问数、龙虾跑流程——三层架构各司其职"
        ✅ "56倍转化率、4天变几分钟：用数字还原AI的真实价值"
        ✅ "「AI不能凭空解决问题」：良品铺子给出的三条落地经验"
      错误示例：
        ❌ "客户背景"  ❌ "解决方案介绍"  ❌ "量化成效"  ❌ "经验总结"

    structure:
      - section: 1
        purpose: 引出客户核心挑战，建立读者共鸣
        title_rule: >
          体现客户行业处境或核心矛盾，有具体行业/公司信息，
          不得使用"背景""为何用AI"等通用词
        title_example: "增速放缓、对手涌入，一家零食巨头的三道坎"

      - section: 2
        purpose: 介绍瓴羊产品组合及技术架构，说明各产品解决什么问题
        title_rule: >
          体现具体产品名称或技术逻辑，突出"如何解决"而非"产品介绍"，
          可用破折号或并列结构体现多产品协同
        title_example: "Dataphin打底、Quick BI问数、龙虾跑流程——三层架构各司其职"

      - section: 3
        purpose: 还原落地过程的关键节点、阶段和人的决策
        title_rule: >
          体现时间感或转折感，还原"从0到1"的真实过程，
          可以包含年份或阶段关键词
        title_example: "二十年信息化积累，才让AI在90天内跑通"

      - section: 4
        purpose: 客观说明AI能做什么、做不了什么，体现专业可信度
        title_rule: >
          体现边界感和人机分工，避免"AI万能"的夸大印象，
          可用对比结构（什么交给AI / 什么留给人）
        title_example: "规则清晰的活儿交给AI，判断和创意仍在人手里"

      - section: 5
        purpose: 列出可量化的业务成效，数字直接说话
        title_rule: >
          直接体现最亮眼的数字或结果，数字放在标题里，
          不得使用"成效""效果""价值体现"等空泛词
        title_example: "56倍转化率、4天变几分钟：用数字还原AI的真实价值"

      - section: 6
        purpose: 提炼方法论，给读者可复用的经验洞察
        title_rule: >
          体现洞察或金句，优先引用客户原话，
          可用引号突出核心观点
        title_example: "「AI不能凭空解决问题」：良品铺子给出的三条落地经验"

  - step: 6
    name: 输出四个主标题方案供用户选择
    instruction: >
      案例正文全部输出完毕后，紧接着提供 4 个不同风格的文章主标题方案，
      供用户选择或作为灵感参考。
      四个方案必须风格有明显差异，分别对应：
        方案1·数字驱动：突出最亮眼的量化结果，让数字出现在标题里
        方案2·悬念反差：制造认知反差或出乎意料的信息，引发读者好奇
        方案3·人物故事：以CIO或核心决策人的视角/行动切入，有人的温度
        方案4·方法论：提炼客户最核心的经验公式，适合行业传播和转发
    output_template: |
      ---
      以下是 4 个主标题方案，供您选择：

      【方案1·数字驱动】{标题1}
      【方案2·悬念反差】{标题2}
      【方案3·人物故事】{标题3}
      【方案4·方法论  】{标题4}

      您可以直接选用，也可以告诉我调整方向。

# ──────────────────────────────────────
# 写作规则
# ──────────────────────────────────────
writing_rules:

  language_style:
    - 使用业务语言，不用技术黑话；目标读者是企业中高层管理者
    - 逻辑结构清晰，段落有起承转合，不堆砌列表
    - 语气专业但不刻板，允许适当的叙事张力
    - 客户证言控制在 200 字以内，必须有出处（姓名+职位）
    - 禁止出现"赋能""闭环""生态""全链路"等空洞词汇

  data_handling:
    - 只使用资料中明确出现的数据，不得推断或编造
    - 数据缺失时使用标注格式：***（补充说明：此处需补充XXX数据）
    - 关键数字需注明来源背景（时间段、对比基准）

  product_mention:
    - 产品名称使用官方全称，首次出现后可使用简称
    - 不得混淆不同产品的功能描述

# ──────────────────────────────────────
# 禁止事项
# ──────────────────────────────────────
prohibitions:
  - 禁止跳过 STEP 2 产品确认步骤，未经用户确认不得开始撰写
  - 禁止跳过 STEP 3 角度选择步骤，未经用户选定角度不得开始撰写
  - 禁止使用"赋能""闭环""生态""全链路""数字化转型"等空洞词汇
  - 禁止编造数据、引言、案例细节
  - 禁止使用"背景""解决方案""落地过程""量化成效""核心经验""Before/After"等通用板块标题
  - 禁止在资料不充分时强行输出，应先向用户补充提问
  - 禁止一次性提出超过 5 个补充问题
