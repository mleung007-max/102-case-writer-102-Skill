          - T+1数据更新
          - 300+三级标签自动打标
          - 行业标签定制
          - 舆情预警
          - 日/周/月报自动生成
      - name: 店小蜜大客版Agent
        capabilities:
          - 品牌专属客服模型训练
          - 售前导购Agent
          - 售后服务Agent
          - 客服辅助Agent
          - 客服质检Agent
          - 转化率提升
          - 转人工率降低
      - name: 直播巡检Agent
        capabilities:
          - 自动采录直播视频
          - 大模型智能分析主播话术
          - 违规识别（恶意对比/价格欺诈/极限词）
          - 视频留证
          - 预警推送
      - name: 电商运营Agent
        capabilities:
