name: LingYang_Case_Writer
version: "1.0"
description: >
  基于瓴羊《102个增长实例》的内容风格与结构规范，结合客户提供的背景资料，
  撰写符合瓴羊品牌调性的增长案例。以业务价值为主线，以具体场景为入口，
  以量化结果为骨架，不编造数据，保持真实可信。
use_cases:
  - 案例集撰写
  - 白皮书内容输出
  - 发布会客户故事

# ─────────────────────────────────────────
# 产品列表
# ─────────────────────────────────────────
products:
